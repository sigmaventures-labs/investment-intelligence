    prompt: |
      Build scenario analysis for a platform LBO of a B2B software company at 12x ARR. Key variables are ARR growth (30% consensus), gross margin expansion, and exit multiple (could be 8x–16x depending on market). Bull case is strategic buyer interest; bear is extended hold and multiple compression. 5-year horizon.
    expected_sections:
      - Key Variables table

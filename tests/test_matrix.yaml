# Test Matrix for Investment Analysis AI Skills
# 18 primary test cases (6 skills × 3 asset classes) + 3 edge cases

test_cases:
  # =============================================================================
  # THEMATIC-SCREENING
  # =============================================================================

  - skill: thematic-screening
    asset_class: public-equities
    v1: true
    prompt: |
      Screen for beneficiaries and losers from GLP-1 (Ozempic/Wegovy) adoption reshaping consumer spending and healthcare costs. Focus on US large- and mid-cap equities. I want to understand who wins beyond the obvious drug manufacturers — trace through food and beverage volume impact, medical device displacement, managed care MLR effects, and any non-obvious second- or third-order effects.
    expected_sections:
      - Thesis Summary
      - Causal Chain Diagram
      - Asset Map
      - Pressure Test Notes
      - Top 5 Deep Dive Candidates
      - Data Gaps & Next Steps
    checklist:
      - At least 3 levels of causal chain depth explored
      - Negative exposure / losers included, not just beneficiaries
      - Each entry has a specific mechanism, not just category association
      - Counter-thesis articulated for top candidates
      - Exposure metric quantified where possible
      - Non-obvious / surprising entries included (the value is in the tail)
      - Investability constraints acknowledged

  - skill: thematic-screening
    asset_class: real-estate
    v1: false
    prompt: |
      Map the investable real estate implications of accelerated EV adoption and charging infrastructure buildout in the US over the next 5 years. Include direct beneficiaries (retail with charging, multifamily with EV-ready parking), losers (gas-station-anchored retail, parking-heavy office), and second-order effects on property values, cap rates, and development economics.
    expected_sections:
      - Thesis Summary
      - Causal Chain Diagram
      - Asset Map
      - Pressure Test Notes
      - Top 5 Deep Dive Candidates
      - Data Gaps & Next Steps
    checklist:
      - At least 3 levels of causal chain depth explored
      - Negative exposure / losers included, not just beneficiaries
      - Each entry has a specific mechanism, not just category association
      - Counter-thesis articulated for top candidates
      - Exposure metric quantified where possible
      - Non-obvious / surprising entries included (the value is in the tail)
      - Investability constraints acknowledged

  - skill: thematic-screening
    asset_class: private-equity
    v1: false
    prompt: |
      Screen for PE deal opportunities and risk from supply chain nearshoring and friend-shoring — companies moving production back to North America or to allied countries. Include direct beneficiaries (domestic manufacturers, logistics), losers (pure China-dependent supply chains), and second-order effects on portfolio company valuations, add-on M&A, and sector attractiveness.
    expected_sections:
      - Thesis Summary
      - Causal Chain Diagram
      - Asset Map
      - Pressure Test Notes
      - Top 5 Deep Dive Candidates
      - Data Gaps & Next Steps
    checklist:
      - At least 3 levels of causal chain depth explored

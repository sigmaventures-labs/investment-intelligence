  # =============================================================================
  # CROSS-ASSET-SIGNALS
  # =============================================================================

  - skill: cross-asset-signals
    asset_class: public-equities
    v1: true
    prompt: |
      My thesis is that US consumer resilience supports long consumer discretionary equities over the next 6 months. Run a cross-asset check — what do rates, credit, FX, commodities, and vol tell us? Are there dislocations? I want to know if the tape confirms or contradicts before I add to positions.
    expected_sections:
      - Thesis statement
      - Signal Survey table
      - Alignment Matrix
      - Synthesis narrative
    checklist:
      - Thesis stated as testable proposition
      - At least 3 core lenses + relevant asset-class-specific signals surveyed
      - Agreements AND disagreements identified
      - Dislocations assessed for which market is likely right
      - Historical context provided
      - Synthesis is opinionated
      - Monitoring signals defined with thresholds

  - skill: cross-asset-signals
    asset_class: real-estate
    v1: false
    prompt: |
      I'm evaluating whether multifamily cap rates will hold or expand over the next 12 months. Run a cross-asset synthesis — incorporate CMBS spreads, REIT pricing, Treasury moves, and any RE-specific signals. I need to know if the macro backdrop supports our underwriting assumptions or if we're behind the curve.
    expected_sections:
      - Thesis statement
      - Signal Survey table
      - Alignment Matrix
      - Synthesis narrative
    checklist:
      - Thesis stated as testable proposition
      - At least 3 core lenses + relevant asset-class-specific signals surveyed
      - Agreements AND disagreements identified
      - Dislocations assessed for which market is likely right
      - Historical context provided
      - Synthesis is opinionated
      - Monitoring signals defined with thresholds

  - skill: cross-asset-signals
    asset_class: private-equity
    v1: false
    prompt: |
      I'm considering deploying into a new PE fund focused on middle-market LBOs. Run a cross-asset check on the leveraged finance environment — where do leveraged loan spreads, CLO issuance, HY spreads, and dry powder sit? I want to understand if this is a supportive or hostile environment for LBO deal flow and exit multiples. Make sure to identify any contradictions or disagreements across markets, not just confirming signals.
    expected_sections:
      - Thesis statement as testable proposition
      - Signal Survey table with historical context for each signal
      - Alignment Matrix with explicit disagreements/dislocations (or evidence-backed explanation of why all signals agree)
      - Dislocation assessment stating which market is likely right with historical precedent
      - Synthesis narrative with monitoring thresholds
    checklist:
      - Thesis stated as testable proposition
      - At least 3 core lenses + relevant asset-class-specific signals surveyed
      - Agreements AND disagreements identified
      - Dislocations assessed for which market is likely right
      - Historical context provided
      - Synthesis is opinionated
      - Monitoring signals defined with thresholds

  # =============================================================================
  # SCENARIO-ANALYSIS
  # =============================================================================

  - skill: scenario-analysis
    asset_class: public-equities
    v1: true
    prompt: |
      Build bull/base/bear scenarios for CrowdStrike (CRWD) at $310. Key variables are revenue growth (consensus ~30%), NRR (~118%), FCF margin, and forward EV/sales multiple. My base case is platform consolidation drives steady growth; bull is TAM expansion into SIEM; bear is macro seat optimization and Microsoft E5 competition. Time horizon 12 months. I need the full output including the two-variable sensitivity table, break-even assumptions, monitoring framework with thresholds, and explicit decision triggers.
    expected_sections:
      - Key Variables table with sensitivity ranking
      - Scenario definitions with narratives and probabilities
      - Expected Return calculation with risk/reward ratio
      - Two-variable sensitivity table showing where the thesis breaks
      - Break-even assumptions (explicit values)
      - Monitoring Framework table with Increase/Hold/Reduce decision triggers and specific thresholds
    checklist:
      - Variables ranked by sensitivity
      - Scenarios internally consistent
      - Probabilities sum to ~100%
      - Bull/bear NOT symmetric
      - Base case = your view, not consensus
      - Expected return and risk/reward calculated
      - Sensitivity table reveals where the thesis breaks
      - Break-even assumptions identified
      - Monitoring framework with specific thresholds
      - Decision triggers are observable

  - skill: scenario-analysis
    asset_class: real-estate
    v1: false
    prompt: |
      Model scenarios for a 200-unit suburban multifamily acquisition in Austin at a 4.8% going-in cap. Key variables are rent growth (consensus 4%), exit cap rate (current 4.8%, could move ±50bps), and occupancy (93% stabilized). Bull case assumes tech job growth accelerates; bear case assumes supply overtakes demand. 5-year hold.
    expected_sections:
      - Key Variables table
      - Scenario definitions
      - Expected Return calculation
      - Sensitivity Table
      - Monitoring Framework
    checklist:
      - Variables ranked by sensitivity
      - Scenarios internally consistent
      - Probabilities sum to ~100%
      - Bull/bear NOT symmetric
      - Base case = your view, not consensus
      - Expected return and risk/reward calculated
      - Sensitivity table reveals where the thesis breaks
      - Break-even assumptions identified
      - Monitoring framework with specific thresholds
      - Decision triggers are observable

  - skill: scenario-analysis
    asset_class: private-equity

    prompt: |
      Map catalysts for a PE-owned industrial equipment manufacturer over the next 24 months. Key events include a union contract renewal in 6 months, a major product launch in Q3, and fund year-5 considerations for exit timing. The thesis is operational improvement plus strategic buyer interest. I need to understand sequencing, what could derail an exit, and optimal timing windows.
    expected_sections:
      - Catalyst enumeration
      - Asymmetry Assessment
      - Calendar
      - Clusters/Gaps/Dependencies

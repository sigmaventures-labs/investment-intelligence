  # =============================================================================
  # INVESTMENT-MEMO
  # =============================================================================

  - skill: investment-memo
    asset_class: public-equities
    v1: true
    prompt: |
      Write a long investment memo on Copart (CPRT) at $45. Our thesis is that ADAS-equipped vehicles raise total-loss frequency structurally (not cyclically), and consensus is wrong to model reversion to pre-ADAS levels. We have claims analysis from 3 insurers showing ADAS cars totaled at 1.4x the rate. Catalyst is Q2 earnings in July. Target $58, 12-month horizon.
    expected_sections:
      - Executive Summary
      - Variant Perception
      - Business Overview
      - Key Drivers
      - Path to Value Realization
      - Valuation
      - Risk Factors
      - Position Sizing
      - Monitoring Framework
    checklist:
      - Executive summary is self-contained and compelling in under 5 sentences
      - Variant perception is specific, not generic
      - At least 3 key drivers with your view vs. consensus/market
      - Value realization path is time-bound
      - Valuation includes sensitivity on key assumptions
      - Risks are honest and include mitigants
      - Return target is transparently derived
      - No section reads like a generic overview — every paragraph earns its place


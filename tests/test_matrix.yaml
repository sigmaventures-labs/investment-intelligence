  # =============================================================================
  # CIO-QA-PREP
  # =============================================================================

  - skill: cio-qa-prep
    asset_class: public-equities
    v1: true
    prompt: |
      I'm pitching a long position in Danaher (DHR) to my PM tomorrow. Thesis is biotech funding recovery flows through to instrument orders 2 quarters earlier than sell-side models. I have channel checks from 12 lab procurement officers showing order book uptick. Prepare me for the toughest questions — including why this isn't just buying the most expensive name and hoping for a cycle turn.
    expected_sections:
      - Questioner Archetypes
      - Questions with difficulty ratings
      - Answer Playbook entries
      - Vulnerability Assessment
    checklist:
      - At least 15 questions across all categories
      - At least 3 Killer difficulty questions
      - Answers are concise (2-3 sentences), not defensive essays
      - If pressed further for Hard and Killer questions
      - Red lines identified
      - Vulnerability assessment is honest
      - Pre-meeting actions are specific
      - Opening framing suggested

  - skill: cio-qa-prep
    asset_class: real-estate
    v1: false
    prompt: |
      I'm going to deal committee next week to defend our proposed acquisition of a 120-unit value-add multifamily in Dallas. We're underwriting 200bps of cap rate expansion at exit and 8% rent growth from the renovation program. Prepare me for pushback on our exit cap assumption, labor cost risks for the reno, and why we're not overpaying in a competitive process. I need the full 15-25 question playbook with answers, not a short summary.
    expected_sections:
      - Questioner Archetypes
      - At least 15 numbered questions (Q1 through Q15+)
      - Answer Playbook entries with Difficulty, Best answer, If pressed further, Red line
      - Vulnerability Assessment with strongest/weakest points, pre-meeting actions, opening framing
    checklist:
      - At least 15 questions across all categories
      - At least 3 Killer difficulty questions
      - Answers are concise (2-3 sentences), not defensive essays
      - If pressed further for Hard and Killer questions
      - Red lines identified
      - Vulnerability assessment is honest
      - Pre-meeting actions are specific
      - Opening framing suggested

  - skill: cio-qa-prep
    asset_class: private-equity
    v1: false
    prompt: |
      I'm presenting our platform investment in a specialty chemical distribution business ($250M revenue) to the investment committee. We're proposing 6.5x entry, 4.5x leverage, with a thesis around geographic expansion and vendor consolidation. Help me prepare for questions on cyclicality, customer concentration (top 5 = 40% of revenue), and how we'll achieve our 3x MOIC target in 5 years.

  # =============================================================================
  # CATALYST-MAPPING
  # =============================================================================

  - skill: catalyst-mapping
    asset_class: public-equities
    v1: true
    prompt: |
      Map the catalyst calendar for Vertex Pharmaceuticals (VRTX) over the next 8 months. I have a long thesis on pipeline optionality — VX-548 PDUFA in acute pain is end of March, and there's Trikafta ex-US rollout. I need to understand what's priced in, asymmetry on each event, and whether there are clusters or gaps that affect timing.
    expected_sections:
      - Catalyst enumeration
      - Asymmetry Assessment
      - Calendar
      - Clusters/Gaps/Dependencies
      - Action Recommendations
    checklist:
      - All categories in the asset-class taxonomy systematically checked
      - Dates classified as Confirmed / Estimated / Speculative
      - Magnitude estimates for material catalysts
      - Asymmetry assessed (not just direction)
      - Priced in analysis for highest-impact events
      - Clusters and gaps identified
      - Dependencies/sequencing mapped
      - Action recommendations are specific and time-bound

  - skill: catalyst-mapping
    asset_class: real-estate
    v1: false
    prompt: |
      Build an event calendar for a 450,000 SF office property in Chicago with a major tenant (45% of NRA) whose lease expires in 18 months. There's also a $85M mortgage coming due in 24 months. Map lease renegotiation milestones, refinancing events, and any permitting or capital project catalysts. I need to know where the value-moving events cluster and what's actionable.
    expected_sections:
      - Catalyst enumeration
      - Asymmetry Assessment
      - Calendar
      - Clusters/Gaps/Dependencies
      - Action Recommendations
    checklist:
      - All categories in the asset-class taxonomy systematically checked
      - Dates classified as Confirmed / Estimated / Speculative
      - Magnitude estimates for material catalysts
      - Asymmetry assessed (not just direction)
      - Priced in analysis for highest-impact events
      - Clusters and gaps identified
      - Dependencies/sequencing mapped
      - Action recommendations are specific and time-bound

  - skill: catalyst-mapping
    asset_class: private-equity

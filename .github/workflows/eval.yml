name: Eval Quality Gate

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'rules/**'
      - 'commands/**'
      - 'tests/**'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'rules/**'
      - 'commands/**'
      - 'tests/**'
  workflow_dispatch:

jobs:
  validate:
    name: Structural Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run validate.py
        run: python3 tests/validate.py

  eval:
    name: LLM-as-Judge Evaluation
    runs-on: ubuntu-latest
    needs: validate
    env:
      EVAL_PROVIDER: openai
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      - name: Run eval pipeline
        run: python3 tests/eval.py --no-history

      - name: Check for regressions
        run: python3 tests/compare.py

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            tests/reports/eval-report.md
            tests/reports/eval-results.json
